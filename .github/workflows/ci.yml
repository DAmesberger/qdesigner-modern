name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The app pool connects as the non-BYPASSRLS `qdesigner_app` role — the
  # production posture — so RLS-enforcement tests that read DATABASE_URL run
  # against the same role production does. The role + its dev password are
  # created by migration 00018, which the tests' provision() step runs
  # (against DATABASE_URL_MIGRATIONS) before any pool is handed out.
  DATABASE_URL: postgresql://qdesigner_app:qdesigner_app@localhost:5432/qdesigner
  # Superuser DSN used to run migrations and to seed RLS-bound fixture tables.
  DATABASE_URL_MIGRATIONS: postgresql://qdesigner:qdesigner@localhost:5432/qdesigner
  # Turn an unreachable DB into a hard failure instead of a false-green skip.
  REQUIRE_DB: "1"
  JWT_SECRET: test-secret-jwt-token-with-at-least-32-characters-long
  JWT_REFRESH_SECRET: test-refresh-secret-token-for-refresh-tokens
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: qdesigner-media
  SMTP_HOST: localhost
  SMTP_PORT: 1025
  # MailPit HTTP API for the P3-T3 email-delivery probe (the SMTP receiver's
  # web/API port). Not carried in .env.development.
  MAILPIT_HTTP: http://localhost:8025
  SERVER_PORT: 3000

jobs:
  # Backend checks
  backend:
    runs-on: ubuntu-latest
    # Force the sqlx query!/query_as! macros to expand from the committed
    # apps/server/.sqlx cache instead of the live DB (ADR 0024). The global
    # DATABASE_URL above points at a bare postgres whose schema is only
    # created once migrations run, so it must not be consulted at
    # macro-expansion time.
    env:
      SQLX_OFFLINE: "true"
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: qdesigner
          POSTGRES_USER: qdesigner
          POSTGRES_PASSWORD: qdesigner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Object storage for the P3-T3 storage-client + media-proxy tests.
      # bitnami/minio (NOT official minio/minio): a GH service container
      # cannot supply the `server /data` command the official image needs,
      # whereas bitnami's entrypoint starts the server from env alone.
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # SMTP sink for the P3-T3 email-verification delivery test. axllent/mailpit's
      # default entrypoint needs no args: 1025 = SMTP, 8025 = HTTP API/UI.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/server/Cargo.lock') }}

      - name: Check formatting
        working-directory: apps/server
        run: cargo fmt --check

      - name: Clippy
        working-directory: apps/server
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: apps/server
        run: cargo build

      - name: Test
        working-directory: apps/server
        run: cargo test -- --include-ignored

  # Frontend checks
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

  # E2E smoke tests (PR gate)
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm test:e2e:smoke
        env:
          VITE_APP_URL: http://localhost:5173

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The app pool connects as the non-BYPASSRLS `qdesigner_app` role — the
  # production posture — so RLS-enforcement tests that read DATABASE_URL run
  # against the same role production does. The role + its dev password are
  # created by migration 00018, which the tests' provision() step runs
  # (against DATABASE_URL_MIGRATIONS) before any pool is handed out.
  DATABASE_URL: postgresql://qdesigner_app:qdesigner_app@localhost:5432/qdesigner
  # Superuser DSN used to run migrations and to seed RLS-bound fixture tables.
  DATABASE_URL_MIGRATIONS: postgresql://qdesigner:qdesigner@localhost:5432/qdesigner
  # Turn an unreachable DB (or MinIO) into a hard failure instead of a
  # false-green skip. Do not remove: the reachability gates in tests/common
  # key off this.
  REQUIRE_DB: "1"
  JWT_SECRET: test-secret-jwt-token-with-at-least-32-characters-long
  JWT_REFRESH_SECRET: test-refresh-secret-token-for-refresh-tokens
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: qdesigner-media
  SMTP_HOST: localhost
  SMTP_PORT: 1025
  # MailPit HTTP API for the P3-T3 email-delivery probe (the SMTP receiver's
  # web/API port). Not carried in .env.development.
  MAILPIT_HTTP: http://localhost:8025
  SERVER_PORT: 3000

jobs:
  # ── Backend gate ──────────────────────────────────────────────────────────
  # cargo fmt / clippy / build / test --include-ignored
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Force the sqlx query!/query_as! macros to expand from the committed
    # apps/server/.sqlx cache instead of the live DB (ADR 0024). The global
    # DATABASE_URL above points at a bare postgres whose schema is only
    # created once migrations run, so it must not be consulted at
    # macro-expansion time.
    env:
      SQLX_OFFLINE: "true"
    services:
      postgres:
        image: postgres:18.0-alpine
        env:
          POSTGRES_DB: qdesigner
          POSTGRES_USER: qdesigner
          POSTGRES_PASSWORD: qdesigner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # SMTP sink for the P3-T3 email-verification delivery test. axllent/mailpit's
      # default entrypoint needs no args: 1025 = SMTP, 8025 = HTTP API/UI.
      # Pinned (was `:latest`) so a mailpit release cannot break CI on an
      # unchanged tree.
      mailpit:
        image: axllent/mailpit:v1.30.4
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      # MinIO is deliberately NOT a `services:` container. The official
      # minio/minio image needs a `server /data` argument, and GitHub service
      # containers have no way to supply a command/args (only `options:`, which
      # maps to `docker create` flags). The previous workflow reached for
      # bitnami/minio — whose entrypoint starts the server from env alone — but
      # Bitnami retired its free Docker Hub catalog, so `bitnami/minio:latest`
      # now resolves to nothing at all (the repo has zero tags) and the whole
      # backend job died at "Initialize containers" with:
      #     manifest for bitnami/minio:latest not found: manifest unknown
      # Running it ourselves lets us pass the command AND pin the release.
      # storage_minio.rs constructs S3StorageService::new, which creates the
      # bucket if missing, so no mc/minio-init sidecar is required here.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live; then
              echo "minio is live"
              exit 0
            fi
            echo "waiting for minio ($i/30)..."
            sleep 2
          done
          echo "::error::MinIO did not become healthy"
          docker logs minio || true
          exit 1

      # Pre-create every bucket the suite touches, mirroring the `minio-init`
      # sidecar in docker-compose.test.yml (which is why the suite is green
      # locally but was red here).
      #
      # Without this, S3StorageService::new races itself:
      #     let exists = client.head_bucket()...;      // all see "missing"
      #     if exists.is_err() { client.create_bucket()... }   // losers 500
      # cargo runs test binaries as parallel processes, and storage_minio.rs,
      # http_media_email.rs and anon_path_limits.rs all build a service over the
      # SAME qdesigner-media-test bucket, so they collide on create_bucket and
      # the losers get BucketAlreadyOwnedByYou:
      #     Failed to create S3 bucket: service error
      # Pre-creating makes head_bucket succeed, so create_bucket never fires.
      # (The TOCTOU in s3.rs is a real latent bug — flagged separately; this
      # step reproduces the working local environment rather than papering over
      # it in the tests.)
      #
      # The minio image ships `mc`, so no extra image pull is needed.
      - name: Create MinIO buckets
        run: |
          docker exec minio mc alias set local http://localhost:9000 minioadmin minioadmin
          for b in qdesigner-media qdesigner-media-test qdesigner-gdpr-test; do
            docker exec minio mc mb --ignore-existing "local/$b"
          done
          docker exec minio mc anonymous set download local/qdesigner-media
          docker exec minio mc ls local

      # rustup reads /rust-toolchain.toml (channel + clippy/rustfmt), so the
      # toolchain is pinned in-tree rather than floating on `stable`. A floating
      # stable meant any new upstream lint broke `clippy -D warnings` on an
      # unchanged tree.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add clippy rustfmt
          rustc --version && cargo --version && cargo clippy --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', 'apps/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path apps/server/Cargo.toml -- --check

      # --all-targets so tests/ and benches/ are linted too, matching the
      # documented phase gate in CLAUDE.md (the old step linted only the lib).
      - name: Clippy
        run: cargo clippy --manifest-path apps/server/Cargo.toml --all-targets -- -D warnings

      - name: Build
        run: cargo build --manifest-path apps/server/Cargo.toml

      # --include-ignored runs the DB/MinIO/SMTP-backed integration tests.
      # REQUIRE_DB=1 (workflow env) makes an unreachable service a hard panic,
      # so this cannot silently pass by skipping.
      - name: Test
        run: cargo test --manifest-path apps/server/Cargo.toml -- --include-ignored

      - name: Dump MinIO log on failure
        if: failure()
        run: docker logs minio || true

  # ── Frontend gate ─────────────────────────────────────────────────────────
  # check / test / scripting-engine test / build
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # No `version:` input. The root package.json declares
      # `packageManager: pnpm@8.15.2`, and pnpm/action-setup@v4 hard-errors when
      # a version is ALSO passed here:
      #     Error: Multiple versions of pnpm specified: [...]
      #     Remove one of these versions to avoid version mismatch errors
      # That killed this job (and e2e-smoke / e2e-fullstack) at step 2, before a
      # single test ever ran. packageManager is now the single source of truth.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Node 22 to match the nix flake (pkgs.nodejs_22), which is the source of
      # truth for local dev. CI was on 20.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Advisory only — NOT part of the documented phase gate in CLAUDE.md, and
      # currently red on main with 22 pre-existing errors (8 no-explicit-any,
      # 8 no-self-assign, 6 no-unused-vars) that predate this workflow and are a
      # product-source cleanup, not a CI concern. Left visible so the debt is
      # tracked; flip to a hard gate once the backlog is burned down.
      - name: Lint (advisory)
        continue-on-error: true
        run: pnpm lint

      - name: Type check
        run: pnpm --filter @qdesigner/web check

      - name: Unit tests (web)
        run: pnpm --filter @qdesigner/web test

      - name: Unit tests (scripting-engine)
        run: pnpm --filter @qdesigner/scripting-engine test

      - name: Build
        run: pnpm --filter @qdesigner/web build

  # ── E2E smoke (PR gate) ───────────────────────────────────────────────────
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        # No VITE_APP_URL override: dev-urls.ts then derives the frontend URL as
        # http://localhost:4173 (APP_PORT default), which is exactly the port the
        # playwright webServer (`pnpm dev` = vite) binds. A stale
        # VITE_APP_URL=http://localhost:5173 pointed baseURL at a port nothing
        # listens on.
        run: pnpm test:e2e:smoke

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: apps/web/playwright-report/
          retention-days: 30

  # ── E2E fullstack + visual + reaction + form (PR gate) ────────────────────
  # Real browser against a live backend. The @fullstack, @visual, @reaction and
  # @form specs all call provisionWorkspace(), so they need the Rust server +
  # postgres/redis/minio/mailpit. This job also enforces the committed
  # *-linux.png visual baselines on every PR (CI is ubuntu-latest, so the
  # -linux snapshot suffix matches).
  e2e-fullstack:
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 60
    env:
      # Override the workflow-level DSNs (which target the backend job's :5432
      # GH service) with the docker-compose.test.yml stack ports. main.rs runs
      # sqlx::migrate! via DATABASE_URL_MIGRATIONS at startup, which creates the
      # non-superuser qdesigner_app role the app pool (DATABASE_URL) connects as.
      DATABASE_URL: postgresql://qdesigner_app:qdesigner_app@localhost:15435/qdesigner_test
      DATABASE_URL_MIGRATIONS: postgresql://qdesigner:qdesigner@localhost:15435/qdesigner_test
      REDIS_URL: redis://localhost:16382
      MINIO_ENDPOINT: http://localhost:19005
      SMTP_HOST: localhost
      SMTP_PORT: 11027
      SERVER_PORT: 4100
      APP_HOST: localhost
      APP_PORT: 4173
      CORS_ORIGINS: http://localhost:4173
      # cargo build --release expands the sqlx query macros from the committed
      # apps/server/.sqlx cache; the compose DB has no schema until the server
      # runs migrations at startup, so it must not be consulted at build time.
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Start test infrastructure
        # postgres :15435, redis :16382, minio :19005 (+ minio-init bucket),
        # mailpit :11027 — all defined in docker-compose.test.yml.
        #
        # `up -d --wait` on the whole file fails even when everything works:
        # --wait requires every service to end up running/healthy, but minio-init
        # is a one-shot that runs `mc mb` and exits. The previous run showed all
        # four services Healthy and `minio-init exited (0)` — and compose still
        # returned exit code 1. So: --wait on the long-running services only,
        # then run the init container and check its exit code explicitly.
        run: |
          docker compose -f docker-compose.test.yml up -d --wait postgres redis minio mailpit
          docker compose -f docker-compose.test.yml up -d minio-init
          code=$(docker wait qdesigner-test-minio-init)
          if [ "$code" != "0" ]; then
            echo "::error::minio-init failed (exit $code)"
            docker logs qdesigner-test-minio-init || true
            exit 1
          fi
          echo "minio-init completed successfully"

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version && cargo --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/server/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust-toolchain.toml', 'apps/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build server (release)
        run: cargo build --manifest-path apps/server/Cargo.toml --release

      - name: Start server
        # Detached; migrations + qdesigner_app creation happen on boot. Env is
        # inherited from the job-level env block above.
        run: |
          nohup ./apps/server/target/release/qdesigner-server > server.log 2>&1 &
          echo "server started (pid $!)"

      - name: Wait for server health
        run: >-
          curl --retry 30 --retry-delay 2 --retry-connrefused --fail
          http://localhost:4100/health

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run fullstack E2E tests
        # playwright webServer boots `pnpm dev` (vite on APP_PORT=4173), whose
        # /api proxy targets SERVER_PORT=4100.
        run: pnpm test:e2e:fullstack

      - name: Run visual regression tests
        run: pnpm test:e2e:visual

      - name: Run reaction (WebGL) E2E tests
        # RT-6 lane. Same live backend as @fullstack; the reaction-chromium project
        # adds SwiftShader + autoplay launch flags for headless WebGL + audio. Runs
        # last so its anonymous session-creates don't share the 60 s auth-limiter
        # window (10 req/IP) with the fullstack lane's registrations.
        run: pnpm test:e2e:reaction

      - name: Run form E2E tests
        # @form lane (issue #35). DOM fillout path against the same live backend;
        # one shared workspace per worker (like @reaction) so it registers a single
        # user rather than tripping the 60 s auth-limiter window.
        run: pnpm test:e2e:form

      - name: Dump server log on failure
        if: failure()
        run: cat server.log || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-fullstack
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test results (visual diffs)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-fullstack
          path: apps/web/test-results/
          retention-days: 30

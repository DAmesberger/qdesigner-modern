# E2E browser lanes (QUARANTINED — run on demand, not on a schedule).
#
# Why this workflow is not scheduled and not part of the PR gate:
#
# These lanes have never had a green run. Until now they could not even start —
# CI died at `pnpm/action-setup` on every push — and once that was fixed the
# specs themselves turned out to be broken in ways that predate this workflow:
#
#   * @smoke — drives a hardcoded project id `test-project-1` that does not
#     exist, with no auth wiring, against a job that starts no backend. The
#     repo's own audit already documented this, at
#     docs/decisions/PHASE_7_FINDINGS.md:34:
#         "The smoke PR gate is genuinely broken and has no auth wiring [...]
#          test-project-1 is a nonexistent hardcoded id and test #2's
#          /test-runtime route is deleted. Fix is as recommended: seed auth like
#          the fullstack lane and provision a real workspace."
#     (This workflow DOES give it a backend, which removes one of the two
#     causes; the hardcoded id and the missing auth seeding remain.)
#
#   * @fullstack — 2/2 failing. The specs successfully register, provision a
#     workspace, create, publish and open the questionnaire by code, and then
#     never reach `fillout-completion-screen`; the designer spec times out in
#     `page.waitForResponse` waiting for its save. Backend-side this is clean
#     (migrations apply, server healthy), so these are app/spec defects.
#
# Fixing them is test-authoring and product debugging, not CI plumbing, so they
# are quarantined here rather than deleted (no spec was removed) and rather than
# left permanently red (a red pipeline nobody can act on trains everyone to
# ignore CI — the exact failure this cleanup is meant to end).
#
# The schedule is commented out DELIBERATELY. Re-enable it, and move the lanes
# back into ci.yml's PR gate, once the specs above are fixed.

name: E2E (on demand)

on:
  # Re-enable once the @smoke and @fullstack specs are fixed (see header).
  # schedule:
  #   - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Backend stack DSNs + app/server ports. Every lane below can hit
      # provisionWorkspace(), so the live Rust server + compose stack are started
      # up-front. main.rs runs sqlx::migrate! via DATABASE_URL_MIGRATIONS at
      # startup, creating the non-superuser qdesigner_app role the app pool
      # (DATABASE_URL) connects as.
      DATABASE_URL: postgresql://qdesigner_app:qdesigner_app@localhost:15435/qdesigner_test
      DATABASE_URL_MIGRATIONS: postgresql://qdesigner:qdesigner@localhost:15435/qdesigner_test
      REDIS_URL: redis://localhost:16382
      MINIO_ENDPOINT: http://localhost:19005
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: qdesigner-media
      SMTP_HOST: localhost
      SMTP_PORT: 11027
      JWT_SECRET: test-secret-jwt-token-with-at-least-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-token-for-refresh-tokens
      SERVER_PORT: 4100
      APP_HOST: localhost
      APP_PORT: 4173
      CORS_ORIGINS: http://localhost:4173
      # release build expands sqlx macros from the committed apps/server/.sqlx
      # cache; the compose DB has no schema until the server migrates on boot.
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      # ── Backend first ─────────────────────────────────────────────────────
      # The old nightly ran the regression lane BEFORE any backend existed, so
      # its provisionWorkspace() specs could never pass — it was red by
      # construction, and the later lanes were bolted on with `if: !cancelled()`
      # to paper over it. Starting the stack up-front removes that root cause.
      - name: Start test infrastructure
        # postgres :15435, redis :16382, minio :19005 (+ minio-init bucket),
        # mailpit :11027 — all defined in docker-compose.test.yml.
        #
        # `up -d --wait` on the whole file fails even when everything works:
        # --wait requires every service to end up running/healthy, but minio-init
        # is a one-shot that runs `mc mb` and exits. A real run showed all four
        # services Healthy and `minio-init exited (0)` — and compose still
        # returned 1. So: --wait the long-running services, then assert the init
        # container's exit code explicitly.
        run: |
          docker compose -f docker-compose.test.yml up -d --wait postgres redis minio mailpit
          docker compose -f docker-compose.test.yml up -d minio-init
          code=$(docker wait qdesigner-test-minio-init)
          if [ "$code" != "0" ]; then
            echo "::error::minio-init failed (exit $code)"
            docker logs qdesigner-test-minio-init || true
            exit 1
          fi
          echo "minio-init completed successfully"

      # Pinned in-tree by /rust-toolchain.toml rather than floating on `stable`.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version && cargo --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/server/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust-toolchain.toml', 'apps/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build server (release)
        run: cargo build --manifest-path apps/server/Cargo.toml --release

      - name: Start server
        run: |
          nohup ./apps/server/target/release/qdesigner-server > server.log 2>&1 &
          echo "server started (pid $!)"

      - name: Wait for server health
        run: >-
          curl --retry 30 --retry-delay 2 --retry-connrefused --fail
          http://localhost:4100/health

      # ── Frontend + browsers ───────────────────────────────────────────────
      # No `version:` input — root package.json's `packageManager: pnpm@8.15.2`
      # is the single source of truth. Passing both made pnpm/action-setup@v4
      # hard-error with "Multiple versions of pnpm specified".
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Node 22 to match the nix flake (pkgs.nodejs_22).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # @playwright/test lives in apps/web, not the workspace root: a bare
        # `pnpm exec playwright` at the root fails with "Command playwright not
        # found" (ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL).
        run: pnpm --filter @qdesigner/web exec playwright install --with-deps chromium firefox webkit

      # ── Lanes ─────────────────────────────────────────────────────────────
      # No VITE_APP_URL override: dev-urls.ts derives the frontend URL from
      # APP_PORT (4173), which is the port the playwright webServer (`pnpm dev`
      # = vite) actually binds. The old stale VITE_APP_URL=:5173 pointed baseURL
      # at a port nothing listens on.
      #
      # Every lane runs even if an earlier one fails (`!cancelled()`), so one
      # broken lane cannot mask the state of the others while the quarantine is
      # being worked off.
      - name: Run E2E smoke tests
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:smoke

      - name: Run E2E regression tests (chromium + firefox + webkit)
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:regression:all

      - name: Run fullstack E2E tests
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:fullstack

      - name: Run visual regression tests
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:visual

      - name: Run reaction (WebGL) E2E tests
        # Runs late so its anonymous session-creates don't share the 60 s
        # auth-limiter window (10 req/IP) with the other lanes' registrations.
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:reaction

      - name: Run form E2E tests
        # @form lane (issue #35). DOM fillout path; one shared workspace per worker
        # so it doesn't share the 60 s auth-limiter window with the other lanes.
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:form

      - name: Dump server log on failure
        if: failure()
        run: cat server.log || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test results (visual diffs)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-e2e
          path: apps/web/test-results/
          retention-days: 30

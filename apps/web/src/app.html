<!DOCTYPE html>
<html lang="%lang%" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QDesigner Modern - Professional Questionnaire Platform</title>


    <!-- SEO Meta Tags -->
    <meta name="description" content="Professional questionnaire design platform with frame-accurate, high-resolution reaction timing for psychological and behavioral research" />
    <meta property="og:title" content="QDesigner Modern" />
    <meta property="og:description" content="Professional questionnaire design platform" />
    <meta property="og:type" content="website" />
    <script>
      // Prevent dark mode flash on page load
      const theme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.add(theme);
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full">
    <div style="display: contents" class="h-full">%sveltekit.body%</div>
  </body>
</html>
